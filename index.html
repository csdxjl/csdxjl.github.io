<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- 图标CDN替换 -->
	<link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/pageicon/7.ico" type="image/x-icon">
	<title>7</title>
	<style>
		@font-face {
			font-family: Chinese;
			/* 字体文件CDN路径 */
			src: url(https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/resource/SanJiZhiLiangHeiJianTi.ttf);
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html,
		body {
			background: #000;
			height: 100vh;
			width: 100vw;
			position: fixed;
		}

		body {
			transition: background-color 2s ease;
		}

		#poweron {
			margin-left: calc(50vw - 50px);
			margin-top: calc(50vh - 50px);
		}

		#poweronbuttonring {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			background: conic-gradient(transparent 0deg,
					transparent 45deg,
					#333 45deg,
					#333 315deg,
					transparent 315deg,
					transparent 360deg);
			mask: radial-gradient(transparent 50%,
					black 50%);
		}

		#poweronbuttoninside {
			margin-top: 0px;
			margin-left: 42.5px;
			transform: translateY(-14vh);
			width: 15px;
			height: 8vh;
			background-color: #333;
			border-radius: 15%;
		}

		#poweroning {
			display: none;
			align-items: center;
			justify-content: center;
			flex-direction: column;
		}

		#loading {
			position: relative;
			display: flex;
			align-items: flex-end;
			justify-content: center;
			gap: 1vh;
			perspective: 200px;
			background-color: transparent;
			height: 6vh;
		}

		#loading-1 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.0s;
		}

		#loading-2 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.1s;
		}

		#loading-3 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.2s;
		}

		#loading-4 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.3s;
		}

		#loading-5 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.4s;
		}

		#loading-6 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.5s;
		}

		#loading-7 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.6s;
		}

		@keyframes loading {
			0% {
				transform: scaleY(1) translateY(0);
			}

			to {
				transform: scaleY(0.7) translateY(2vh);
			}
		}

		#yanimg {
			width: 67vh;
			height: 67vh;
		}

		#loadingline {
			margin-top: 4vh;
			height: 20px;
			width: 200px;
			border-radius: 10%;
			border: #000 solid 2px;
		}

		#hand {
			height: 8vh;
			width: 8vh;
			transform: translate(-4vw, -4vh);
		}

		#panda {
			height: 7vh;
			width: 7vh;
			display: none;
			transform: translate(9vw, -4vh);
		}

		#word {
			transform: translate(9vw, -6vh);
		}

		#signin {
			display: none;
			height: 100vh;
			width: 100vw;
			position: relative;
			backdrop-filter: blur(8px);
		}

		#signinheader {
			color: #fff;
		}

		#signinicon {
			margin-top: 15vh;
			margin-left: 45vw;
			height: 10vw;
			width: 10vw;
			border-radius: 50%;
		}

		#signininput {
			margin: auto;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
		}

		#signinsubmit {
			margin-top: 2vh;
			width: 7vw;
			height: 5vh;
			background-color: #ebebeb;
			border: #bdbdbd solid 2px;
			font-size: 3vh;
			font-weight: lighter;
			border-radius: 5px;
		}

		#signinsubmit:active {
			background-color: #bdbdbd;
			border: #959595 solid 2px;
		}

		#loading-l {
			position: relative;
			display: flex;
			align-items: flex-end;
			justify-content: center;
			gap: 1vh;
			perspective: 200px;
			background-color: rgba(0, 0, 0, 0);
			height: 5vw;
		}

		#loading-l-1 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.0s;
			color: white;
		}

		#loading-l-2 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.1s;
			color: white;
		}

		#loading-l-3 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.2s;
			color: white;
		}

		#loading-l-4 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.3s;
			color: white;
		}

		#loading-l-5 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.4s;
			color: white;
		}

		#loading-l-6 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.5s;
			color: white;
		}

		#loading-l-7 {
			background-color: rgba(0, 0, 0, 0);
			animation: loading-l 0.7s infinite ease-in-out alternate;
			font-family: 'Maple Mono NF CN', serif;
			font-size: 1.5vw;
			font-weight: bold;
			animation-delay: 0.6s;
			color: white;
		}

		@keyframes loading-l {
			0% {
				transform: scaleY(1) translateY(0);
			}

			to {
				transform: scaleY(0.7) translateY(2vh);
			}
		}

		#desktop {
			display: none;
			height: 100vh;
			width: 100vw;
			position: relative;
		}

		#realdesktop{
			height: 94vh;
			width: 100vw;
		}

		#taskbar {
			height: 6vh;
			width: 100vw;
			position: absolute;
			left: 0;
			bottom: 0;
			background: rgba(236, 236, 236, 0.9);
			backdrop-filter: blur(8px);
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1vw;
			position: relative;
			z-index: 999;
		}

		#yandows {
			height: 5vh;
			width: 5vh;
			transform: translateY(0.3vh) scale(1.0);
			filter: brightness(0);
			transition: all 0.15s ease-in-out;
			margin-left: 2vw;
		}

		#yandows.clicked {
			transform: translateY(0.3vh) scale(0.7);
			filter: brightness(-1);
		}

		#yandowsandappicons {
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#yandowsmenu {
			height: 90vh;
			width: 40vw;
			transition: all 0.15s ease-in-out;
			background-color: rgba(236, 236, 236, 0.9);
			backdrop-filter: blur(8px);
			transform: translate(5px, 0vh);
			border-radius: 10px;
			position: absolute;
			z-index: -999;
		}
	</style>
</head>

<body>
	<div id="startup">
		<div id="poweron">
			<div id="poweronbuttonring"></div>
			<div id="poweronbuttoninside"></div>
		</div>
		<div id="poweroning">
			<div id="startupimage">
				<!-- 图片CDN -->
				<img src="https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/resource/yan.png" alt="7" id="yanimg">
			</div>
			<div id="loading">
				<div id="loading-1">7</div>
				<div id="loading-2">7</div>
				<div id="loading-3">7</div>
				<div id="loading-4">7</div>
				<div id="loading-5">7</div>
				<div id="loading-6">7</div>
				<div id="loading-7">7</div>
			</div>
			<div id="loadingline">
				<!-- 图片CDN -->
				<img src="https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/resource/hand.png" alt="7" id="hand">
				<img src="https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/resource/panda.png" alt="7" id="panda">
				<i id="word"
					style="font-family: 'Chinese','Maple Mono NF CN',serif;font-size: 20px;display: none;">冲突了</i>
			</div>
		</div>
	</div>
	<div id="signin">
		<!-- 登录图标CDN -->
		<img src="https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/icon/7.png" alt="7" id="signinicon">
		<div id="signininput">
			<h1 style="margin-top:3vh;font-family: '微软雅黑','Maple Mono NF CN',serif;font-size: 40px;font-weight: lighter;"
				id="signinheader">登录</h1>
			<input type="password" id="password" placeholder="tips:雷坚"
				style="margin-top:2vh;height: 5vh;width: 17vw;border-radius: 5px;" autocomplete="off">
			<button id="signinsubmit" onclick="checkpassword()">登录</button>
			<div id="loading-l" style="display: none;margin-top: 4vh;">
				<div id="loading-l-1">7</div>
				<div id="loading-l-2">7</div>
				<div id="loading-l-3">7</div>
				<div id="loading-l-4">7</div>
				<div id="loading-l-5">7</div>
				<div id="loading-l-6">7</div>
				<div id="loading-l-7">7</div>
			</div>
		</div>
	</div>
	<div id="desktop">
		<div id="realdesktop">
			<div id="appicons"></div>
		</div>
		<div id="taskbar">
			<div id="yandowsandappicons">
				<!-- 任务栏图标CDN -->
				<img src="https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/resource/yandows.png" alt="7" id="yandows">
				<div id="appiconsfixed"></div>
			</div>
			<div id="statusdisplay"></div>
		</div>
		<div id="yandowsmenu"></div>
	</div>
	<div id="shutdown">

	</div>
</body>
<script>
	const doms = {
		startup: document.getElementById("startup"),
		poweronbuttonring: document.getElementById("poweronbuttonring"),
		poweronbuttoninside: document.getElementById("poweronbuttoninside"),
		poweron: document.getElementById("poweron"),
		poweroning: document.getElementById("poweroning"),
		loadingline: document.getElementById("loadingline"),
		hand: document.getElementById("hand"),
		panda: document.getElementById("panda"),
		word: document.getElementById("word"),
		signin: document.getElementById("signin"),
		password: document.getElementById("password"),
		signinloading: document.getElementById("loading-l"),
		signinsubmit: document.getElementById("signinsubmit"),
		desktop: document.getElementById("desktop"),
		signinheader: document.getElementById("signinheader"),
		yandowsmenu: document.getElementById("yandowsmenu"),
		yandows: document.getElementById("yandows"),
		taskbar: document.getElementById("taskbar"),
		realdesktop: document.getElementById("realdesktop"),
	}
	///*
	const times = {
		poweron: 100,//1000
		startupspeed: 5,//50
		startupwaitspeed: 200,//2000
		opendesktopwaitspeed: 300,//3000
		signinerror: 150,//1500
	}
	//*/

	/*
		const times = {
			poweron: 1000,//1000
			startupspeed: 50,//50
			startupwaitspeed: 2000,//2000
			opendesktopwaitspeed: 3000,//3000
			signinerror: 1500,//1500
		}
	*/

	let isstart = false;
	let timer = null;
	document.addEventListener("keydown", e => handlespace(e));
	doms.poweron.addEventListener("click", (e) => {
		clearTimeout(timer);
		if (!isstart) {
			doms.poweronbuttonring.style.background = "conic-gradient(transparent 0deg,transparent 45deg,#f10 45deg,#f10 315deg,transparent 315deg,transparent 360deg)";
			doms.poweronbuttoninside.style.background = "#f10";
			isstart = true;

			timer = setTimeout(() => {
				startup();
			}, times.poweron)
		} else {
			doms.poweronbuttonring.style.background = "conic-gradient(transparent 0deg,transparent 45deg,#333 45deg,#333 315deg,transparent 315deg,transparent 360deg)";
			doms.poweronbuttoninside.style.background = "#333";
			isstart = false;
		}
	})

	function startup() {
		doms.poweron.style.display = "none";
		document.removeEventListener("keydown", handlespace);
		document.body.style.backgroundColor = "#ffffff";
		doms.poweroning.style.display = "flex";
		handanimation();
	}

	function handanimation() {
		let percent = 0;
		const timer = setInterval(() => {
			doms.hand.style.transform = `translate(${-55 + 200 * (percent / 100)}px,-20px)`;
			doms.loadingline.style.background = `linear-gradient(90deg, #000 0%, #000 ${percent}%, #fff ${percent}%, #fff 100%)`;
			percent += 1;
			if (percent >= 102) {
				clearInterval(timer);
				doms.word.style.display = "inline-block";
				doms.panda.style.display = "inline-block";
				setTimeout(signin, times.startupwaitspeed);
			}
		}, times.startupspeed);
	}

	function signin() {
		doms.startup.style.display = "none";
		doms.signin.style.display = "block";
		// 桌面背景CDN路径替换
		document.body.style.background = "url(https://cdn.jsdelivr.net/gh/csdxjl/resource@main/assets/desktop/7.png) center/cover no-repeat";
		document.addEventListener("keydown", e => handleenter(e));
	}

	function checkpassword() {
		const input = doms.password.value;

		/*
		if (input == atob("Nzc3Nzc3Nw==")) {
			doms.signinsubmit.style.display = "none";
			doms.signinloading.style.display = "flex";
			doms.signinheader.innerHTML = "欢迎";
			setTimeout(opendesktop, times.opendesktopwaitspeed);
		} else {
			doms.password.type = "text";
			doms.password.style.color = "#f10";
			doms.password.value = "这不对着呢啊！";
			setTimeout(() => {
				doms.password.type = "password";
				doms.password.value = "";
				doms.password.style.color = "#000"
			}, times.signinerror)
		}
		*/

		document.removeEventListener("keydown", handleenter);

		///*
		doms.signinsubmit.style.display = "none";
		doms.signinloading.style.display = "flex";
		doms.signinheader.innerHTML = "欢迎";
		setTimeout(opendesktop, times.opendesktopwaitspeed);
		//*/
	}

	function handleenter(e) {
		///*
		if (e.keyCode == 13) {
			e.preventDefault();
			doms.signinsubmit.click();
		}
		//*/
	}

	function handlespace(e) {
		///*
		if (e.keyCode == 32) {
			e.preventDefault();
			doms.poweron.click();
		}
		//*/
	}

	function opendesktop() {
		doms.signin.style.display = "none";
		doms.desktop.style.display = "block";
	}

	let ismenuout = false;
	doms.yandows.onclick = () => {
		doms.yandows.classList.add('clicked');
		setTimeout(() => {
			doms.yandows.classList.remove('clicked');
		}, 150);
		if (!ismenuout) {
			doms.yandowsmenu.style.transform = "translate(5px, -96.5vh)";
			doms.yandowsmenu.style.zIndex=999;
			ismenuout = true;
		} else {
			doms.yandowsmenu.style.transform = "translate(5px,0vh)";
			doms.yandowsmenu.style.zIndex=-999;
			ismenuout = false;
		}
	}

	document.addEventListener("click", (e) => {
		///*
		console.log({
			//desktop: doms.desktop.contains(document.elementFromPoint(e.clientX, e.clientY)),
			menu: doms.yandowsmenu.contains(document.elementFromPoint(e.clientX, e.clientY)),
			//taskbar: doms.taskbar.contains(document.elementFromPoint(e.clientX, e.clientY)),
		})
		//*/
		if(!ismenuout){
			return;
		}
		const isyandows=doms.yandows.contains(document.elementFromPoint(e.clientX, e.clientY));
		const ismenu=doms.yandowsmenu.contains(document.elementFromPoint(e.clientX, e.clientY));
		if(!isyandows&&!ismenu){
			doms.yandowsmenu.style.transform = "translate(5px,0vh)";
			ismenuout = false;
		}
	})

</script>

</html>
